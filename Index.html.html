    get: function (key) {

        if (v === null) return Promise.reject(new Error('key not found: ' + key));
        return Promise.resolve({
          key: key,
          value: v,
          shared: false
        });

/* --- Small utilities --- */
function makeId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function todayISO() {
  const d = new Date();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + mm + '-' + dd;
}

// Convert stored ISO date (YYYY-MM-DD) to the user's M/D/YY display style.
function formatDate(iso) {
  if (!iso || iso.indexOf('-') === -1) return iso || '';
  const parts = iso.split('-');
  return parseInt(parts[1], 10) + '/' + parseInt(parts[2], 10) + '/' + parts[0].slice(2);
}

// Build the notation string from a set list.
// Weighted sets show WEIGHT x REPS; body-weight drills show reps only.
function compileSets(sets) {
  if (!sets) return '';
  return sets.filter(set => String(set.weight).trim() !== '' || String(set.reps).trim() !== '').map(set => {
    const w = String(set.weight).trim();
    const r = String(set.reps).trim();
    if (w === '') return r || '?'; // body-weight drill: reps only
    return w + 'x' + (r || '?'); // standard weight x reps
  }).join(', ');
}

// True if a set list / cardio entry actually has data worth saving.
function entryHasData(ex, entry) {
  if (!entry) return false;
  if (ex && ex.cardio) return !!(entry.cardioText && entry.cardioText.trim());
  return (entry.sets || []).some(set => String(set.weight).trim() !== '' || String(set.reps).trim() !== '');
}

// Find the most recent prior logging of an exercise (workouts must be sorted desc).
function lastEntryFor(exId, workouts) {
  for (const w of workouts) {
    const e = (w.entries || []).find(en => en.exerciseId === exId);
    if (e && (e.sets && compileSets(e.sets) || e.cardioText && e.cardioText.trim())) {
      return {
        date: w.date,
        entry: e
      };
    }
  }
  return null;
}

// Heaviest weight in a set list, for a simple progressive-overload comparison.
function topWeight(sets) {
  let max = -1;
  (sets || []).forEach(set => {
    const w = parseFloat(set.weight);
    if (!isNaN(w) && w > max) max = w;
  });
  return max;
}

    label: 'RCC Circuit',
    locationId: 'rcc',
    entries: {}
  };
}

if (!window.storage) {
  window.storage = {
    get: function (key) {
      try {
        var v = localStorage.getItem(key);
        if (v === null) return Promise.reject(new Error('key not found: ' + key));
        return Promise.resolve({
          key: key,
          value: v,
          shared: false
        });
      } catch (err) {
        console.error('[STORAGE] get failed', err);
        return Promise.reject(err);
      }
    },
    set: function (key, value) {
      try {
        localStorage.setItem(key, value);
        return Promise.resolve({
          key: key,
          value: value,
          shared: false
        });
      } catch (err) {
        console.error('[STORAGE] set failed', err);
        return Promise.reject(err);
      }
    },
    delete: function (key) {
      localStorage.removeItem(key);
      return Promise.resolve({
        key: key,
        deleted: true,
        shared: false
      });
    },
    list: function (prefix) {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (!prefix || k && k.indexOf(prefix) === 0) keys.push(k);
      }
      return Promise.resolve({
        keys: keys,
        shared: false
      });
    }

/* =========================================================================

     - River Crossing Club (Spring Branch, TX) -- Life Fitness equipment
     - Home Gym (Dallas, TX) -- IM2000

   - Data persists across sessions via window.storage (personal scope).
   - Notation follows the user's own convention: WEIGHT x REPS (e.g. 75x16).
   - Body-weight power drills (throws, jumps) log reps only (e.g. 5, 5, 4).

/* --- Small utilities --- */
function makeId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// Give a workout an updatedAt timestamp if it lacks one (seed / legacy data).
// Used so the sync merge has a comparable "last changed" time on every workout.
function withSeedStamp(w) {
  if (w && w.updatedAt) return w;
  return {
    ...w,
    updatedAt: w && w.date ? w.date + 'T12:00:00.000Z' : new Date().toISOString()
  };
}

// Friendly short timestamp for the sync status line, e.g. "5/23 4:30 PM".
function formatSyncTime(iso) {
  const d = new Date(iso);
  if (!iso || isNaN(d.getTime())) return '';
  let h = d.getHours();
  const mm = String(d.getMinutes()).padStart(2, '0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12;
  if (h === 0) h = 12;
  return d.getMonth() + 1 + '/' + d.getDate() + ' ' + h + ':' + mm + ' ' + ap;
}
function todayISO() {
  const d = new Date();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + mm + '-' + dd;
}

// Convert stored ISO date (YYYY-MM-DD) to the user's M/D/YY display style.
function formatDate(iso) {
  if (!iso || iso.indexOf('-') === -1) return iso || '';
  const parts = iso.split('-');
  return parseInt(parts[1], 10) + '/' + parseInt(parts[2], 10) + '/' + parts[0].slice(2);
}

// Build the notation string from a set list.
// Weighted sets show WEIGHT x REPS; body-weight drills show reps only.
function compileSets(sets) {
  if (!sets) return '';
  return sets.filter(set => String(set.weight).trim() !== '' || String(set.reps).trim() !== '').map(set => {
    const w = String(set.weight).trim();
    const r = String(set.reps).trim();
    if (w === '') return r || '?'; // body-weight drill: reps only

// newly added seed exercises / workouts / templates / locations appear.

  // Exercises: keep the user's, ensure a location field, merge in new seed exercises.
  const byId = {};
  (Array.isArray(raw.exercises) ? raw.exercises : []).forEach(e => {
    if (e && e.id) byId[e.id] = {

      location: e.location || 'rcc'

  });
  seed.exercises.forEach(se => {
    if (!byId[se.id]) byId[se.id] = se;

  // Templates: keep the user's, merge in any new seed templates by id.
  let templates = Array.isArray(raw.templates) && raw.templates.length ? raw.templates : [];
  const tplIds = new Set(templates.map(t => t.id));
  seed.templates.forEach(st => {

  // workouts by id, then sort newest first.
  let workouts = (Array.isArray(raw.workouts) ? raw.workouts : []).map(w => ({

    locationId: w.locationId || 'rcc',
    updatedAt: w.updatedAt || (w.date ? w.date + 'T12:00:00.000Z' : new Date().toISOString())
  }));
  const woIds = new Set(workouts.map(w => w.id));

/* =========================================================================
   Cloud sync -- GitHub-backed.

   The synced payload is { schema, exercises, workouts, templates, locations }.
   The on-screen draft is intentionally NOT synced -- it is transient,
   per-device working state. Each workout carries an updatedAt timestamp;
   merges keep the most recently updated copy of each workout, and deletions
   are kept as tombstones (deleted: true) so a delete on one device also
   propagates to the others.
   ========================================================================= */

// UTF-8 safe base64. Plain btoa/atob mishandle non-ASCII characters.
function utf8ToB64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function b64ToUtf8(b64) {
  return decodeURIComponent(escape(atob(String(b64).replace(/\s/g, ''))));
}

// The subset of app data that is synced (everything except the live draft).
function payloadFromData(data) {
  return {
    schema: SYNC_SCHEMA,
    exercises: data.exercises || [],
    workouts: data.workouts || [],
    templates: data.templates || [],
    locations: data.locations || []
  };
}

// Stable string form of a payload, used to detect "nothing changed" so the
// app never pushes a no-op commit. Arrays are sorted by id first so two
// devices computing the same merge produce byte-identical output.
function canonicalPayload(p) {
  const byId = arr => [...(arr || [])].sort((a, b) => String(a && a.id).localeCompare(String(b && b.id)));
  return JSON.stringify({
    schema: p.schema || SYNC_SCHEMA,
    exercises: byId(p.exercises),
    locations: byId(p.locations),
    templates: byId(p.templates),
    workouts: byId(p.workouts)

}

// Union two id-keyed lists. Entries from b win on an id conflict.
function unionById(a, b) {
  const m = {};
  (a || []).forEach(x => {
    if (x && x.id) m[x.id] = x;
  });
  (b || []).forEach(x => {
    if (x && x.id) m[x.id] = x;
  });
  return Object.values(m);
}

// Merge workout lists by id, keeping the copy with the newer updatedAt.
// Deletions are tombstones, so a newer "deleted" copy correctly wins.
function mergeWorkouts(remote, local) {
  const m = {};
  const consider = w => {
    if (!w || !w.id) return;
    const cur = m[w.id];
    if (!cur) {
      m[w.id] = w;
      return;
    }
    const a = cur.updatedAt || '';
    const b = w.updatedAt || '';
    if (b >= a) m[w.id] = w; // newer wins; on a tie the later-processed copy wins
  };
  (remote || []).forEach(consider); // remote processed first
  (local || []).forEach(consider); // local processed second -> wins ties
  return Object.values(m);
}

// Merge a remote payload with local data into one combined payload.
function mergePayloads(remote, local) {
  return {
    schema: SYNC_SCHEMA,
    exercises: unionById(remote.exercises, local.exercises),
    templates: unionById(remote.templates, local.templates),
    locations: unionById(remote.locations, local.locations),
    workouts: mergeWorkouts(remote.workouts, local.workouts)
  };
}

// Standard headers for the GitHub REST API.
function ghHeaders(token) {
  return {
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };
}

// Read the data file from the repo.
// Returns { payload, sha } -- or { payload: null, sha: null } when the file
// does not exist yet (the first-ever sync). Throws on auth / network errors.
async function ghGetFile(token) {
  const url = 'https://api.github.com/repos/' + SYNC_OWNER + '/' + SYNC_REPO + '/contents/' + SYNC_PATH + '?ref=' + SYNC_BRANCH + '&t=' + Date.now();
  console.log('[SYNC-PULL] GET ' + url);
  let res;
  try {
    res = await fetch(url, {
      headers: ghHeaders(token),
      cache: 'no-store'
    });
  } catch (netErr) {
    console.error('[SYNC-PULL] network error', netErr);
    throw new Error('Network error reaching GitHub.');
  }
  if (res.status === 404) {
    console.log('[SYNC-PULL] data file not found -- treating as first sync');
    return {
      payload: null,
      sha: null
    };
  }
  if (res.status === 401) throw new Error('Token rejected (401). Check or regenerate it.');
  if (res.status === 403) throw new Error('Access denied (403). Token may lack repo access.');
  if (!res.ok) throw new Error('GitHub read failed (HTTP ' + res.status + ').');
  let body;
  try {
    body = await res.json();
  } catch (e) {
    console.error('[SYNC-PULL] bad JSON from GitHub', e);
    throw new Error('Unreadable response from GitHub.');
  }
  let payload;
  try {
    payload = JSON.parse(b64ToUtf8(body.content));
  } catch (e) {
    console.error('[SYNC-PULL] could not parse remote data.json', e);
    throw new Error('Remote data file is corrupt or unreadable.');
  }
  console.log('[SYNC-PULL] ok -- ' + (payload.workouts || []).length + ' workout(s), sha ' + body.sha);
  return {
    payload: payload,
    sha: body.sha
  };
}

// Write the data file to the repo. sha must be the current file sha when
// updating an existing file, or null when creating it for the first time.
async function ghPutFile(token, payload, sha) {
  const url = 'https://api.github.com/repos/' + SYNC_OWNER + '/' + SYNC_REPO + '/contents/' + SYNC_PATH;
  const json = JSON.stringify(payload, null, 2);
  const bodyObj = {
    message: 'workout sync ' + new Date().toISOString(),
    content: utf8ToB64(json),
    branch: SYNC_BRANCH
  };
  if (sha) bodyObj.sha = sha;
  console.log('[SYNC-PUSH] PUT ' + url + ' (' + (sha ? 'update' : 'create') + ')');
  let res;
  try {
    res = await fetch(url, {
      method: 'PUT',
      headers: ghHeaders(token),
      body: JSON.stringify(bodyObj)
    });
  } catch (netErr) {
    console.error('[SYNC-PUSH] network error', netErr);
    throw new Error('Network error reaching GitHub.');
  }
  if (res.status === 409) {
    // The file changed since our read -- another device pushed first.
    console.warn('[SYNC-PUSH] 409 conflict -- remote moved ahead');
    const e = new Error('conflict');
    e.conflict = true;
    throw e;
  }
  if (res.status === 401) throw new Error('Token rejected (401). Check or regenerate it.');
  if (res.status === 403) throw new Error('Access denied (403). Token may lack write access.');
  if (res.status === 404) throw new Error('Repo not found (404). Check the repo name and token access.');
  if (res.status === 422) throw new Error('GitHub rejected the write (422).');
  if (!res.ok) throw new Error('GitHub write failed (HTTP ' + res.status + ').');
  console.log('[SYNC-PUSH] ok');
  return true;
}
